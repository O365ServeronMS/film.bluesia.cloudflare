name: IMDb ratings sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      IMDB_D1_DATABASE_NAME: ${{ vars.IMDB_D1_DATABASE_NAME || 'film-bluesia-imdb' }}
      IMDB_R2_BUCKET: film-bluesia-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx wrangler d1 migrations apply "$IMDB_D1_DATABASE_NAME" --remote
      - run: npm run imdb:sync
